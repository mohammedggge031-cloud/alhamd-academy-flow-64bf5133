  <meta name="twitter:title" content="أكاديمية الحمد | نظام الإدارة">
  <meta property="og:description" content="نظام إدارة أكاديمية الحمد لتحفيظ القرآن الكريم - إدارة الطلاب والمعلمين والحصص والفواتير">
  <meta name="twitter:description" content="نظام إدارة أكاديمية الحمد لتحفيظ القرآن الكريم - إدارة الطلاب والمعلمين والحصص والفواتير">
</head>

  <body>
    <div id="root">
      <!-- Instant splash screen – visible until React hydrates -->
      <div id="splash" style="
        position:fixed;inset:0;z-index:9999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#1a7a4e;font-family:'Cairo',sans-serif;color:#fff;
      ">
        <img src="/favicon.jpeg" alt="" width="80" height="80" style="border-radius:16px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.25);" />
        <div style="font-size:1.4rem;font-weight:700;margin-bottom:6px;">أكاديمية الحمد</div>
        <div style="font-size:.85rem;opacity:.8;margin-bottom:24px;">لتحفيظ القرآن الكريم</div>
        <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;"></div>
        <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash as soon as React renders
      const observer = new MutationObserver(() => {
        const splash = document.getElementById('splash');
        if (splash && document.getElementById('root').children.length > 1) {
          splash.style.transition = 'opacity .3s';
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 300);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
