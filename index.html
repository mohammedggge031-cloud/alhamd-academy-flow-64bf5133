<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg">
    <link rel="apple-touch-icon" href="/favicon.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Alhamd Academy | Management System</title>
    <meta name="description" content="Alhamd Academy Management System - Manage students, teachers, sessions and invoices">
    <meta name="author" content="Alhamd Academy" />

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.jpeg">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">

    <meta name="twitter:card" content="summary" />
    
    <meta name="twitter:image" content="/favicon.jpeg">
    <meta property="og:title" content="Alhamd Academy | Management System">
  <meta name="twitter:title" content="Alhamd Academy | Management System">
  <meta property="og:description" content="Alhamd Academy Management System - Manage students, teachers, sessions and invoices">
  <meta name="twitter:description" content="Alhamd Academy Management System - Manage students, teachers, sessions and invoices">
</head>

  <body>
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0a2a5e;font-family:'Cairo',sans-serif;color:#fff;
      transition:opacity .3s;
    ">
      <img src="/favicon.jpeg" alt="" width="80" height="80" style="border-radius:16px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.25);" />
      <div style="font-size:1.4rem;font-weight:700;margin-bottom:6px;font-family:'Inter',sans-serif;">Alhamd Academy</div>
      <div style="font-size:.85rem;opacity:.8;margin-bottom:24px;font-family:'Inter',sans-serif;">Quran, Arabic & Islamic Studies</div>
      <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;"></div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash once React renders
      var t = setInterval(function(){
        if(document.getElementById('root') && document.getElementById('root').children.length > 0){
          var s = document.getElementById('splash');
          if(s){ s.style.opacity='0'; setTimeout(function(){ s.remove(); },300); }
          clearInterval(t);
        }
      }, 50);
      // Fallback: remove after 5s no matter what
      setTimeout(function(){
        var s = document.getElementById('splash');
        if(s){ s.style.opacity='0'; setTimeout(function(){ s.remove(); },300); }
      }, 5000);
    </script>
  </body>
</html>
